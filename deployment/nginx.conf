# Asel Teknoloji — Nginx Production Config
# Upstream'leri çalışma portlarına göre güncelle

upstream angular_ssr {
    server 127.0.0.1:4000;  # ng serve --port 4000 veya node dist/.../server.mjs
}

upstream dotnet_api {
    server 127.0.0.1:5013;  # dotnet run (AselTeknoloji.WebAPI)
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name aseltekno.com www.aseltekno.com;
    return 301 https://$host$request_uri;
}

# HTTPS ana sunucu
server {
    listen 443 ssl http2;
    server_name aseltekno.com www.aseltekno.com;

    ssl_certificate     /etc/letsencrypt/live/aseltekno.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aseltekno.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 15M;

    # Statik yüklenen görseller — .NET backend'in wwwroot/uploads klasörü
    location /uploads/ {
        proxy_pass http://dotnet_api;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # API istekleri
    location /api/ {
        proxy_pass         http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Dinamik sitemap ve SEO dosyaları — backend üretiyor
    location ~ ^/(sitemap\.xml|robots\.txt|llms\.txt|llms-full\.txt)$ {
        proxy_pass         http://dotnet_api;
        proxy_set_header   Host $host;
    }

    # Swagger (isteğe bağlı: production'da kapatabilirsin)
    location /swagger {
        proxy_pass http://dotnet_api;
        proxy_set_header Host $host;
    }

    # Angular SSR — geri kalan her şey
    location / {
        proxy_pass         http://angular_ssr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
