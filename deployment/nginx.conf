upstream angular_ssr {
    server 127.0.0.1:4000;
}

upstream dotnet_api {
    server 127.0.0.1:5013;
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name aselteknoloji.net www.aselteknoloji.net;

    # Certbot doğrulaması için (SSL alınırken gerekli)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS ana sunucu
server {
    listen 443 ssl http2;
    server_name aselteknoloji.net www.aselteknoloji.net;

    ssl_certificate     /etc/letsencrypt/live/aselteknoloji.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aselteknoloji.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 15M;

    # Yüklenen görseller — backend wwwroot/uploads
    location /uploads/ {
        proxy_pass http://dotnet_api;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # API istekleri
    location /api/ {
        proxy_pass         http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SEO dosyaları — backend üretiyor
    location ~ ^/(sitemap\.xml|robots\.txt|llms\.txt|llms-full\.txt)$ {
        proxy_pass       http://dotnet_api;
        proxy_set_header Host $host;
    }

    # Swagger — production'da kapatmak için bu bloğu sil
    location /swagger {
        proxy_pass       http://dotnet_api;
        proxy_set_header Host $host;
    }

    # Angular SSR — geri kalan her şey
    location / {
        proxy_pass         http://angular_ssr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
