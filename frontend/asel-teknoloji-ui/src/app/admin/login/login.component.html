<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Asel Teknoloji</h1>
      <p class="text-gray-500 mt-1">Admin Paneli</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="label">Kullanıcı Adı</label>
        <input formControlName="username" type="text" class="input" placeholder="Kullanıcı adı" autocomplete="username" />
      </div>
      <div class="mb-4">
        <label class="label">Şifre</label>
        <div class="relative">
          <input formControlName="password" [type]="showPassword ? 'text' : 'password'" class="input pr-10" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" (click)="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            @if (showPassword) { <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg> }
            @else { <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg> }
          </button>
        </div>
      </div>
      <div class="mb-6 flex items-center gap-2">
        <input formControlName="rememberMe" id="rememberMe" type="checkbox" class="w-4 h-4 accent-blue-600 cursor-pointer" />
        <label for="rememberMe" class="text-sm text-gray-600 cursor-pointer select-none">Beni hatırla</label>
      </div>
      @if (error) {
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">{{ error }}</div>
      }
      <button type="submit" [disabled]="loading" class="btn-primary w-full text-center">
        {{ loading ? 'Giriş yapılıyor...' : 'Giriş Yap' }}
      </button>
    </form>
    <div class="mt-4 text-center">
      <a routerLink="/admin/forgot-password" class="text-sm text-blue-600 hover:underline">Şifremi unuttum</a>
    </div>
  </div>
</div>
